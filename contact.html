<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Contact | Kanika Portfolio</title>

    <meta name="description"
          content="Contact Kanika, a B.Tech CSE student at Geeta University, for internships, collaborations, and opportunities.">

    <meta name="keywords"
          content="Contact Kanika, Geeta University, Portfolio, Web Developer">

    <meta name="author" content="Kanika">

    <!-- Open Graph -->
    <meta property="og:title" content="Contact Kanika">
    <meta property="og:description"
          content="Get in touch with Kanika for internships and collaborations.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="images/profile.jpg">

    <link rel="stylesheet" href="css/style.css">

    <!-- Schema.org -->
    <script type="application/ld+json">
    {
      "@context":"https://schema.org",
      "@type":"ContactPage",
      "name":"Contact Kanika",
      "description":"Contact page of Kanika Portfolio"
    }
    </script>

</head>

<body>

<a href="#main-content" class="skip-link">
    Skip to Main Content
</a>

<header>

    <nav aria-label="Main Navigation">

        <div class="logo">
            Kanika
        </div>

        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="projects.html">Projects</a></li>

            <li>
                <a href="contact.html" aria-current="page">
                    Contact
                </a>
            </li>
        </ul>

    </nav>

</header>

<main id="main-content">

    <section class="page-title">

        <h1>Contact Me</h1>

        <p>
            Feel free to reach out regarding internships,
            projects, collaborations, or career opportunities.
        </p>

    </section>

    <section class="contact-section">

        <form id="contactForm">

            <!-- Name -->

            <div class="form-group">

                <label for="name">
                    Full Name
                </label>

                <input
                    type="text"
                    id="name"
                    name="name"
                    placeholder="Enter your full name"
                    required
                    aria-required="true">

            </div>

            <!-- Email -->

            <div class="form-group">

                <label for="email">
                    Email Address
                </label>

                <input
                    type="email"
                    id="email"
                    name="email"
                    placeholder="Enter your email"
                    required
                    aria-required="true">

            </div>

            <!-- Subject -->

            <div class="form-group">

                <label for="subject">
                    Subject
                </label>

                <input
                    type="text"
                    id="subject"
                    name="subject"
                    placeholder="Enter subject"
                    required
                    aria-required="true">

            </div>

            <!-- Message -->

            <div class="form-group">

                <label for="message">
                    Message
                </label>

                <textarea
                    id="message"
                    name="message"
                    rows="6"
                    placeholder="Write your message here"
                    required
                    aria-required="true"></textarea>

            </div>

            <button
                type="submit"
                aria-label="Submit Contact Form">

                Send Message

            </button>

        </form>

    </section>

</main>

<footer>

    <p>
        © 2026 Kanika | Geeta University
    </p>

</footer>

<script src="js/form-validation.js"></script>

</body>
</html>
